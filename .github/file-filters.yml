---
ci_config: &ci_config
  - ".github/workflows/ci.yml"
  - ".github/file-filters.yml"

skill_files: &skill_files
  - "skills/**"

eval_files: &eval_files
  - "eval.yaml"
  - "graders/**"

plugin_files: &plugin_files
  - ".claude-plugin/**"
  - "hooks/**"
  - "hooks-handlers/**"

doc_files: &doc_files
  - "dev/**"
  - "docs/**"

yaml_all: &yaml_all
  - "**/*.{yml,yaml}"
  - "!.github/**"

markdown_all: &markdown_all
  - "**/*.md"

skills_all:
  - *skill_files
  - *eval_files
  - *ci_config

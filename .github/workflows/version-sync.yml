---
# yamllint disable rule:truthy
name: Version sync

on:
  workflow_run:
    workflows: ["Auto bump version"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-versions:
    # Only run after auto-bump succeeds (or when manually dispatched).
    # Acts as a safety net for direct plugin.json edits that bypass auto-bump.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GH_INFRAHUB_BOT_TOKEN }}

      - name: Extract version from plugin.json
        id: version
        run: |
          VERSION=$(jq -r .version .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync versions
        run: bash scripts/sync-versions.sh "${{ steps.version.outputs.version }}"

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/*/SKILL.md .github/.release-manifest.json pyproject.toml
          if git diff --staged --quiet; then
            echo "All versions already in sync"
            exit 0
          fi
          git commit -m "chore: sync version to ${{ steps.version.outputs.version }}"
          git push

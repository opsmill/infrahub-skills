name: Skill Evaluations

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "evaluations/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      model:
        description: "Model to use for evaluations"
        required: false
        default: "sonnet"
      skip_baseline:
        description: "Skip without-skill baseline runs"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the eval matrix dynamically from evaluations/*.json
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Build eval matrix
        id: build
        run: |
          SKIP_BASELINE="${{ inputs.skip_baseline || 'false' }}"
          python3 -c "
          import json, os

          configs = ['with_skill']
          if os.environ.get('SKIP_BASELINE') != 'true':
              configs.append('without_skill')

          with open('evaluations/schema-creator.json') as f:
              data = json.load(f)

          matrix = []
          for ev in data['evals']:
              for config in configs:
                  matrix.append({
                      'eval_id': ev['id'],
                      'prompt': ev['prompt'],
                      'config': config,
                      'skill_name': data['skill_name'],
                  })

          print(json.dumps({'include': matrix}))
          " > /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"
        env:
          SKIP_BASELINE: ${{ inputs.skip_baseline || 'false' }}

  # ---------------------------------------------------------------------------
  # 2. Run each eval prompt via claude-code-action (parallel matrix)
  # ---------------------------------------------------------------------------
  run-eval:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare output directory
        run: |
          mkdir -p eval-results/eval-${{ matrix.eval_id }}/${{ matrix.config }}/outputs

      - name: Build prompt
        id: prompt
        env:
          EVAL_PROMPT: ${{ matrix.prompt }}
          EVAL_CONFIG: ${{ matrix.config }}
        run: |
          OUTPUT_DIR="${{ github.workspace }}/eval-results/eval-${{ matrix.eval_id }}/${{ matrix.config }}/outputs"

          if [ "$EVAL_CONFIG" = "with_skill" ]; then
            {
              printf '%s\n' "Read the skill at skills/schema-creator/SKILL.md and follow its workflow and rules to accomplish this task."
              printf '\n%s %s\n' "Task:" "$EVAL_PROMPT"
              printf '\n%s %s/schema.yml\n' "Save ONLY the final schema YAML file to:" "$OUTPUT_DIR"
            } > /tmp/eval_prompt.txt
          else
            {
              printf '%s\n' "Do NOT read any files from the skills/ directory. Use only your general knowledge of Infrahub."
              printf '\n%s %s\n' "Task:" "$EVAL_PROMPT"
              printf '\n%s %s/schema.yml\n' "Save ONLY the final schema YAML file to:" "$OUTPUT_DIR"
            } > /tmp/eval_prompt.txt
          fi

          {
            echo "prompt<<EOF"
            cat /tmp/eval_prompt.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run eval with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          claude_args: |
            --model ${{ inputs.model || 'sonnet' }}
            --max-turns 25
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash"
          # NOTE: For skills that need Infrahub access (check-creator,
          # generator-creator, etc.), add infrahub-mcp via --mcp-config:
          #
          # claude_args: |
          #   --mcp-config '{"mcpServers":{"infrahub":{"command":"uvx","args":["infrahub-mcp"],"env":{"INFRAHUB_ADDRESS":"${{ secrets.INFRAHUB_ADDRESS }}","INFRAHUB_API_TOKEN":"${{ secrets.INFRAHUB_API_TOKEN }}"}}}}'
          #   --allowedTools "Read,Write,Edit,Glob,Grep,Bash,mcp__infrahub__*"

      - name: Upload eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ matrix.eval_id }}-${{ matrix.config }}
          path: eval-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. Grade all outputs and generate the report
  # ---------------------------------------------------------------------------
  grade-and-report:
    needs: run-eval
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download all eval outputs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: eval-*

      - name: Consolidate outputs
        run: |
          mkdir -p eval-results
          for dir in artifacts/eval-*/eval-results/; do
            if [ -d "$dir" ]; then
              cp -rn "$dir"/* eval-results/ 2>/dev/null || true
            fi
          done
          echo "=== Consolidated eval results ==="
          find eval-results -type f | sort

      - name: Grade outputs and generate report
        run: |
          python3 scripts/grade_evals.py \
            --eval-file evaluations/schema-creator.json \
            --results-dir eval-results \
            --output-dir eval-report

      - name: Post evaluation summary as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'eval-report/report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No report found, skipping PR comment');
              return;
            }
            const report = fs.readFileSync(reportPath, 'utf8');

            const marker = '<!-- skill-eval-report -->';
            const body = `${marker}\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-report
          path: eval-report/
          retention-days: 30

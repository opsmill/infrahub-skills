---
name: Skill Evaluations

on:
  workflow_call:
    inputs:
      preset:
        description: "Skillgrade preset (smoke, reliable, regression)"
        required: false
        type: string
        default: "smoke"
    secrets:
      ANTHROPIC_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      preset:
        description: "Skillgrade preset (smoke, reliable, regression)"
        required: false
        default: "smoke"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Discover skills from eval.yaml (no hardcoded list)
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      has-skills: ${{ steps.parse.outputs.has-skills }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Parse skill groups from eval.yaml
        id: parse
        run: |
          MATRIX=$(python -c "
          import yaml, json

          with open('eval.yaml') as f:
              config = yaml.safe_load(f)

          # Group task names by skill (extracted from grader paths)
          skill_tasks = {}
          for task in config.get('tasks', []):
              task_name = task.get('name', '')
              for g in task.get('graders', []):
                  parts = g.get('run', '').split('/')
                  if len(parts) >= 3 and 'graders' in parts[0]:
                      skill = parts[1]
                      skill_tasks.setdefault(skill, []).append(task_name)
                      break

          # Build matrix: each entry has skill name + comma-separated eval names
          include = []
          for skill in sorted(skill_tasks):
              include.append({
                  'skill': skill,
                  'evals': ','.join(skill_tasks[skill]),
              })
          print(json.dumps({'include': include}))
          ")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          SKILL_COUNT=$(echo "$MATRIX" | python -c "import sys,json; print(len(json.load(sys.stdin)['include']))")
          if [ "$SKILL_COUNT" -gt 0 ]; then
            echo "has-skills=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-skills=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered $SKILL_COUNT skill(s): $MATRIX"

  # ---------------------------------------------------------------------------
  # Run skillgrade per skill (parallel matrix)
  # ---------------------------------------------------------------------------
  eval:
    needs: discover
    if: needs.discover.outputs.has-skills == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm i -g skillgrade @anthropic-ai/claude-code

      - name: Run skillgrade (${{ matrix.skill }})
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          skillgrade \
            --${{ inputs.preset || 'smoke' }} \
            --ci \
            --provider=local \
            --parallel=5 \
            --eval="${{ matrix.evals }}" \
            --output=eval-results

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ matrix.skill }}
          path: eval-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Collect results and post PR comment
  # ---------------------------------------------------------------------------
  report:
    needs: eval
    runs-on: ubuntu-latest
    if: always() && github.event.pull_request != null
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: eval-results-*

      - name: Post evaluation summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const artifactsDir = 'artifacts';
            if (!fs.existsSync(artifactsDir)) {
              console.log('No artifacts found, skipping PR comment');
              return;
            }

            const reports = [];
            for (const entry of fs.readdirSync(artifactsDir,
                {withFileTypes: true})) {
              if (!entry.isDirectory()) continue;
              const resultDir = path.join(artifactsDir, entry.name);
              const walk = (dir) => {
                for (const f of fs.readdirSync(dir, {withFileTypes: true})) {
                  const full = path.join(dir, f.name);
                  if (f.isDirectory()) walk(full);
                  else if (f.name.endsWith('.md'))
                    reports.push(fs.readFileSync(full, 'utf8'));
                }
              };
              walk(resultDir);
            }

            if (reports.length === 0) {
              console.log('No reports found, skipping PR comment');
              return;
            }

            const marker = '<!-- skill-eval-report -->';
            const body =
              `${marker}\n# Skill Evaluation Results\n\n` +
              reports.join('\n\n---\n\n');

            const {data: comments} =
              await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
            const existing =
              comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-report
          path: artifacts/
          retention-days: 30

---
name: Skill Evaluations

on:
  workflow_call:
    inputs:
      preset:
        description: "Skillgrade preset (smoke, reliable, regression)"
        required: false
        type: string
        default: "smoke"
    secrets:
      ANTHROPIC_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      preset:
        description: "Skillgrade preset (smoke, reliable, regression)"
        required: false
        default: "smoke"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Run skillgrade per skill (parallel matrix)
  # ---------------------------------------------------------------------------
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm i -g skillgrade

      - name: Run skillgrade
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          skillgrade \
            --${{ inputs.preset || 'smoke' }} \
            --ci \
            --output=eval-results

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Collect results and post PR comment
  # ---------------------------------------------------------------------------
  report:
    needs: eval
    runs-on: ubuntu-latest
    if: always() && github.event.pull_request != null
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: eval-results

      - name: Post evaluation summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const artifactsDir = 'artifacts';
            if (!fs.existsSync(artifactsDir)) {
              console.log('No artifacts found, skipping PR comment');
              return;
            }

            const reports = [];
            for (const entry of fs.readdirSync(artifactsDir,
                {withFileTypes: true})) {
              if (!entry.isDirectory()) continue;
              const resultDir = path.join(artifactsDir, entry.name);
              // Walk for .md report files
              const walk = (dir) => {
                for (const f of fs.readdirSync(dir, {withFileTypes: true})) {
                  const full = path.join(dir, f.name);
                  if (f.isDirectory()) walk(full);
                  else if (f.name.endsWith('.md'))
                    reports.push(fs.readFileSync(full, 'utf8'));
                }
              };
              walk(resultDir);
            }

            if (reports.length === 0) {
              console.log('No reports found, skipping PR comment');
              return;
            }

            const marker = '<!-- skill-eval-report -->';
            const body =
              `${marker}\n# Skill Evaluation Results\n\n` +
              reports.join('\n\n---\n\n');

            const {data: comments} =
              await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
            const existing =
              comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-report
          path: artifacts/
          retention-days: 30

---
# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2
#
# Note: Globs are passed explicitly via CLI/CI action, not in this file,
# because markdownlint-cli2 config globs are not consistently respected.
# Target: docs/docs/**/*.md and docs/docs/**/*.mdx

config:
  default: true

  # MD013/line-length - Line length
  MD013:
    line_length: 80
    code_blocks: false
    tables: false
    headings: false

  # MD024/no-duplicate-heading - Multiple headings with the same content
  # Allow duplicate headings in different sections (e.g., tabs)
  MD024:
    siblings_only: true

  # MD025/single-title - Multiple top-level headings
  # Prevent collisions with h1s and frontmatter titles
  MD025:
    front_matter_title: ""

  # MD029/ol-prefix - Ordered list item prefix (disabled for manual numbering)
  MD029: false

  # MD033/no-inline-html - Inline HTML (disabled for MDX React components)
  MD033: false

  # MD041/first-line-heading - First line in a file should be a top-level heading
  MD041: false

  # MD060/table-column-style - Table column style
  MD060:
    column_style: "leading_and_trailing"

# Files to ignore within docs/docs/
ignores:
  - "docs/docs/release-notes/**"
  - "**/AGENTS.md"

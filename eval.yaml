  #
  # COVERAGE: this task plus `schema-branch-first` are the eval coverage for
  # the shared common rule
  # skills/infrahub-common/rules/workflow-branch-for-crud.md (object load and
  # schema load are its two concrete applications). There is no separate
  # common-rule task; the per-skill branch-first rules link back to it.

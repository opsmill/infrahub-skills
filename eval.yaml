version: "1"

defaults:
  agent: claude
  provider: local
  trials: 3
  timeout: 300
  threshold: 0.8

tasks:
  # --- Menu Creator --- #
  - name: flat-menu
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-menus/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub menu for a small data center project. I have these schema
      nodes: DcimDevice, DcimInterface, LocationSite, and OrganizationManufacturer. I just
      want a simple flat menu with all four items visible in the sidebar, no nesting needed.

      Save ONLY the final YAML file to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-menus/check_flat_menu.py
        weight: 1.0
    expected_output: >-
      A flat menu YAML file with apiVersion: infrahub.app/v1, kind: Menu,
      spec.data containing four items. Each item has name, namespace,
      label, kind pointing to the schema node, and an appropriate mdi:
      icon.
    expectations:
      - "File starts with apiVersion: infrahub.app/v1 and kind: Menu"
      - All items are under spec.data as a list
      - Each menu item has both name and namespace properties
      - >-
        Each item uses kind (not path) to link to the schema node
        (e.g., kind: DcimDevice)
      - >-
        Icons use the mdi: prefix (e.g., mdi:server, mdi:ethernet,
        mdi:map-marker, mdi:factory)
      - Each item has a human-readable label property
    assertions:
      - name: apiversion-and-kind
        check: >-
          File has apiVersion: infrahub.app/v1 and kind: Menu
      - name: spec-data-structure
        check: Items are nested under spec.data as a YAML list
      - name: name-and-namespace
        check: >-
          Every menu item has both name and namespace properties
      - name: kind-for-schema-links
        check: >-
          Items use kind property (not path) to reference schema nodes
      - name: mdi-icons
        check: >-
          All icons use the mdi: prefix with appropriate icon names
      - name: labels-present
        check: Each item has a label property with human-readable text

  - name: hierarchical-menu
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-menus/SKILL.md and follow its workflow and rules.

      Task: I need a hierarchical Infrahub menu for a network management project. I want
      two top-level groups: 'Infrastructure' (containing DcimServer, DcimSwitch, DcimPdu)
      and 'Organization' (containing OrganizationManufacturer, OrganizationProvider). The
      top-level groups should be non-clickable headers with icons, and only the leaf items
      should link to schema nodes.

      Save ONLY the final YAML file to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-menus/check_hierarchical.py
        weight: 1.0
    expected_output: >-
      A menu YAML with two top-level group headers (no kind property)
      each containing children.data with leaf items that have kind
      properties. The children.data wrapper must be present — children
      directly containing a list is incorrect.
    expectations:
      - >-
        Two top-level items under spec.data that act as group headers
        (no kind or path property)
      - >-
        Children are wrapped in children.data (not children directly
        containing a list)
      - Leaf items use kind to link to schema nodes
      - Group headers have icon and label but no kind
      - >-
        All five schema nodes appear as leaf items under the correct
        group
      - >-
        Icons are contextually appropriate (e.g., mdi:server for
        servers, mdi:factory for manufacturers)
    assertions:
      - name: group-headers-no-kind
        check: >-
          Top-level group items have no kind or path property
          (non-clickable headers)
      - name: children-data-wrapper
        check: >-
          Children use children.data wrapper, not children directly
          as a list
      - name: leaf-items-have-kind
        check: Leaf items use kind to link to their schema nodes
      - name: correct-grouping
        check: >-
          Server/Switch/PDU under Infrastructure,
          Manufacturer/Provider under Organization
      - name: all-nodes-present
        check: >-
          All five schema nodes (DcimServer, DcimSwitch, DcimPdu,
          OrganizationManufacturer, OrganizationProvider) appear
      - name: contextual-icons
        check: Icons are contextually appropriate for each item type

  - name: generic-kind-menu
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-menus/SKILL.md and follow its workflow and rules.

      Task: I have an Infrahub project with a location hierarchy (LocationRegion,
      LocationSite, LocationRoom, LocationRack) and some device nodes (DcimDevice,
      DcimInterface). I want a menu that has a 'Locations' group linking to the
      LocationGeneric so users see all location types in one view, plus individual
      location type entries nested under it. Devices should be a separate top-level item.
      Also, what do I need to change in my schema so I don't get duplicate menu entries?

      Follow the skill's workflow completely, including step 4 (registration and schema guidance).
      Save the final output to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-menus/check_generic_kind.py
        weight: 1.0
    expected_output: >-
      A menu YAML with a Locations group that has a kind: LocationGeneric
      link plus children for each location type, and a separate Devices
      section. Should also mention setting include_in_menu: false on
      schema nodes and registering the menu file in .infrahub.yml.
    expectations:
      - >-
        Locations group uses kind: LocationGeneric to show all location
        types in one view
      - >-
        Individual location types (Region, Site, Room, Rack) appear as
        children under the Locations group
      - Devices section is separate from Locations
      - >-
        Mentions setting include_in_menu: false on schema nodes to
        prevent duplicate entries
      - >-
        Mentions registering the menu file in .infrahub.yml under
        menus section
      - File includes the $schema comment for IDE validation
    assertions:
      - name: generic-kind-link
        check: >-
          A menu item uses kind: LocationGeneric to show all location
          types
      - name: location-children
        check: >-
          Individual location types (Region, Site, Room, Rack) appear
          as nested children
      - name: separate-devices-section
        check: Devices are in a separate section from Locations
      - name: include-in-menu-false
        check: "Advises setting include_in_menu: false on schema nodes"
      - name: infrahub-yml-registration
        check: Mentions registering the menu file in .infrahub.yml
      - name: schema-comment
        check: Includes the yaml-language-server $schema comment

  # --- Schema Creator --- #
  - name: vlan-management
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a VLAN management system. I need a VLAN node
      with an id attribute (just the VLAN number), a name, a status that should be a
      dropdown (active/reserved/deprecated), and a role field. VLANs belong to a VLANGroup
      which just has a name. Use namespace 'Ipam'.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_vlan.py
        weight: 1.0
    # -- skill-creator metadata (ignored by skillgrade) --
    expected_output: >-
      A schema with correct attribute types (Dropdown not Text for status,
      Number for VLAN ID), attribute names >= 3 chars (not 'id'), proper
      kind references, and order_weight conventions.
    expectations:
      - >-
        The VLAN id attribute is renamed to meet the 3-char minimum
        (e.g., 'vlan_id' or 'vid'), since 'id' is only 2 characters
      - "Status is kind: Dropdown with choice objects, NOT kind: Text"
      - "Attribute kind uses 'Text' not the deprecated 'String'"
      - >-
        VLANGroup peer reference uses full kind 'IpamVlanGroup'
        (not just 'VlanGroup')
      - "human_friendly_id is defined on both nodes"
      - >-
        display_label is a singular Jinja2 string, NOT display_labels
        as a plural list
      - 'Schema starts with version: "1.0"'
    assertions:
      - name: attr-min-length
        check: "VLAN id attribute renamed to >= 3 chars (e.g., vlan_id)"
      - name: dropdown-for-status
        check: >-
          Status uses kind: Dropdown with choice objects, not kind: Text
      - name: no-deprecated-string
        check: "Attribute kinds use 'Text' not the deprecated 'String'"
      - name: full-kind-references
        check: >-
          VLANGroup peer reference uses full kind 'IpamVlanGroup'
      - name: human-friendly-id
        check: >-
          human_friendly_id is defined on both VLAN and VLANGroup nodes
      - name: display-label-singular
        check: >-
          Uses display_label (singular Jinja2 string), not deprecated
          display_labels
      - name: schema-version
        check: "Schema starts with version: '1.0'"

  - name: circuit-management
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a circuit management system. A Circuit connects
      two endpoints (side A and side Z). Each CircuitEndpoint is installed in a specific
      Device. A Provider offers multiple Circuits. Use namespace 'Circuit'. Don't forget
      to make relationships properly bidirectional with matching identifiers on both sides.

      Note: CircuitEndpoints are peers of the Circuit (not children), and Providers are
      independent entities — use Attribute-kind relationships, not Component/Parent.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_circuit.py
        weight: 1.0
    expected_output: >-
      A schema with multiple bidirectional relationship pairs, all with
      matching identifiers. The two circuit endpoints should use Attribute
      kind (not Component/Parent since endpoints are peers of the circuit,
      not children).
    expectations:
      - >-
        Circuit-to-Provider relationship uses kind: Attribute (not
        Component/Parent) with matching identifiers on both sides
      - >-
        CircuitEndpoint-to-Device relationship uses kind: Attribute
        with matching identifiers on both sides
      - >-
        Circuit has two endpoint relationships (side_a and side_z or
        similar) each pointing to CircuitCircuitEndpoint
      - >-
        All relationship identifiers match between the two sides of
        each pair — no mismatched identifiers
      - >-
        All peer references use full namespace+name kind (e.g.,
        CircuitProvider, CircuitCircuitEndpoint, not just 'Provider')
      - "human_friendly_id is defined on Circuit and Provider nodes"
    assertions:
      - name: attribute-kind-relationships
        check: >-
          Circuit-to-Provider uses kind: Attribute with matching
          identifiers
      - name: endpoint-device-relationship
        check: >-
          CircuitEndpoint-to-Device uses kind: Attribute with matching
          identifiers
      - name: two-endpoint-relationships
        check: >-
          Circuit has two endpoint relationships (side_a/side_z)
          pointing to CircuitCircuitEndpoint
      - name: matching-identifiers
        check: >-
          All relationship identifiers match between both sides of
          each pair
      - name: full-kind-references
        check: "All peer references use full namespace+name kind"
      - name: human-friendly-id
        check: "human_friendly_id on Circuit and Provider nodes"

  - name: location-hierarchy
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a location hierarchy: Region > Site > Room > Rack.
      Each level has a name and shortname. Objects should be easily identifiable in the UI.
      Use namespace 'Location'.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_location.py
        weight: 1.0
    expected_output: >-
      A hierarchical schema using a generic with hierarchical: true,
      proper parent/children chain, human_friendly_id, and display_label
      (not deprecated display_labels).
    expectations:
      - "A generic is defined with hierarchical: true"
      - >-
        All location nodes inherit_from the hierarchical generic using
        its full kind
      - Root node (Region) has parent set to empty string or null
      - "human_friendly_id is set on each node"
      - >-
        display_label is used as a singular Jinja2 string, NOT the
        deprecated display_labels (plural list)
      - 'Schema starts with version: "1.0"'
      - "Parent/children chain is correct: Region->Site->Room->Rack"
    assertions:
      - name: hierarchical-generic
        check: "A generic is defined with hierarchical: true"
      - name: inherit-from-generic
        check: >-
          All location nodes inherit_from the hierarchical generic
          using its full kind
      - name: root-no-parent
        check: >-
          Root node (Region) has parent set to empty string or null
      - name: human-friendly-id
        check: "human_friendly_id is set on each node"
      - name: display-label-singular
        check: >-
          Uses display_label (singular Jinja2 string), not deprecated
          display_labels
      - name: schema-version
        check: "Schema starts with version: '1.0'"
      - name: correct-hierarchy-chain
        check: "Parent/children chain: Region->Site->Room->Rack"

  - name: parent-relationships
    trials: 3
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a rack-and-device inventory. A Rack contains many
      Devices, and each Device must belong to exactly one Rack — a device cannot exist
      without its rack. Each Rack belongs to exactly one Site. Use namespace 'Dcim'.

      The Component (parent owns children) and Parent (child points to parent) relationships
      must satisfy the server-side validation: cardinality, optional, and the rule that a
      node cannot have more than one Parent relationship.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_parent_relationships.py
        weight: 1.0
    expected_output: >-
      A schema with Component/Parent relationship pairs where the Parent
      side has cardinality: one and optional: false explicitly set, no
      node has more than one kind: Parent relationship, and identifiers
      match between both sides of each pair.
    expectations:
      - >-
        Each kind: Parent relationship has both cardinality: one AND
        optional: false explicitly set
      - >-
        No node declares more than one relationship with kind: Parent
        (server validates this)
      - >-
        Component/Parent pairs share matching identifiers on both sides
      - >-
        All peer references use the full kind (DcimRack, DcimSite, not
        just Rack/Site)
      - "human_friendly_id is defined on each node"
      - 'Schema starts with version: "1.0"'
    assertions:
      - name: schema-version
        check: "Schema starts with version: '1.0'"
      - name: parent-rel-optional-false
        check: >-
          Every kind: Parent relationship has optional: false and
          cardinality: one
      - name: parent-rel-single
        check: "No node has more than one kind: Parent relationship"
      - name: matching-identifiers
        check: >-
          Component/Parent identifier pairs match on both sides
      - name: full-kind-references
        check: All peer references use full Namespace+Name kind
      - name: human-friendly-id
        check: human_friendly_id defined on each node

  - name: computed-jinja2-name
    trials: 3
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a BGP autonomous-system catalog. An AutonomousSystem
      node has an asn (number) and a description. The display name should NOT be entered by
      the user — it must be auto-derived from the ASN as 'AS<asn>' (e.g., 'AS65000') using a
      Jinja2 computed attribute. The derived name is used as the display label and as part
      of human_friendly_id, so it must always be populated. Use namespace 'Routing'.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_computed_jinja2.py
        weight: 1.0
    expected_output: >-
      A schema where the name attribute uses computed_attribute with
      kind: Jinja2 and a non-empty jinja2_template, paired with
      read_only: true (always required) and optional: false (because
      the value is load-bearing — used as display_label and in
      human_friendly_id).
    expectations:
      - >-
        The name attribute uses computed_attribute with kind: Jinja2
        and a jinja2_template that derives from asn__value
      - >-
        read_only: true is set (mandatory whenever computed_attribute
        is present — Infrahub validates this)
      - >-
        optional: false because the value is load-bearing (display
        label + human_friendly_id)
      - "Attribute kinds use 'Text' not the deprecated 'String'"
      - >-
        All peer references (if any) use the full namespace+name kind
      - 'Schema starts with version: "1.0"'
    assertions:
      - name: schema-version
        check: "Schema starts with version: '1.0'"
      - name: computed-jinja2-readonly
        check: >-
          Every computed_attribute pairs with read_only: true
      - name: computed-jinja2-kind
        check: >-
          computed_attribute uses kind: Jinja2 with a jinja2_template
      - name: no-deprecated-string
        check: "Attribute kinds use 'Text' not deprecated 'String'"

  - name: service-cascade
    trials: 3
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a load-balancer VIP service. A VIPService has a
      name (Text) and references a frontend IP (IpamIPAddress). The VIPService owns a list
      of HealthCheck objects — health checks have no meaning on their own and should be
      deleted when their VIPService is deleted. The frontend IP, however, is shared
      infrastructure: deleting a VIPService must NOT delete its IP. Use namespace 'ServiceLB'.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_service_cascade.py
        weight: 1.0
    expected_output: >-
      A schema where the VIPService → HealthCheck Component relationship
      sets on_delete: cascade explicitly (so health checks are removed
      when the parent VIP is deleted), and the VIPService → IP
      relationship either omits on_delete or sets on_delete: no-action
      (so the shared IP is preserved). Any kind: Parent relationship has
      optional: false.
    expectations:
      - >-
        At least one relationship sets on_delete: cascade — the owned
        HealthCheck children whose existence has no meaning without the
        VIPService
      - >-
        The IP-address reference does NOT set on_delete: cascade
        (no-action or omitted, since the IP is shared infrastructure)
      - >-
        Any kind: Parent relationship has optional: false and
        cardinality: one
      - >-
        Component/Parent identifier pairs match on both sides
      - >-
        All peer references use the full namespace+name kind
        (e.g., IpamIPAddress, not IPAddress)
      - "human_friendly_id is defined on user-facing nodes"
      - 'Schema starts with version: "1.0"'
    assertions:
      - name: schema-version
        check: "Schema starts with version: '1.0'"
      - name: on-delete-cascade-present
        check: >-
          At least one relationship sets on_delete: cascade for owned
          children
      - name: parent-rel-optional-false
        check: >-
          Any kind: Parent relationship has optional: false and
          cardinality: one
      - name: matching-identifiers
        check: Component/Parent identifier pairs match on both sides
      - name: full-kind-references
        check: All peer references use full Namespace+Name kind
      - name: human-friendly-id
        check: human_friendly_id defined on user-facing nodes

  - name: device-artifact-target
    trials: 3
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-schemas/SKILL.md and follow its workflow and rules.

      Task: Create an Infrahub schema for a network-device inventory. Define a generic
      GenericDevice (with shared attributes like hostname and role) and a concrete Device
      node that inherits from it. The concrete Device should:

        - Be eligible for rendered configuration artifacts (so artifact definitions in
          .infrahub.yml can attach to it).
        - Be cloneable from the UI as a starter for new devices (one template per role —
          leaf, spine, edge — speeds onboarding).

      The two capabilities are independent features and should be applied to the concrete
      Device, not to the generic. Use namespace 'Dcim'.

      Save ONLY the final schema YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-schemas/check_artifact_target.py
        weight: 1.0
    expected_output: >-
      A schema with the GenericDevice generic carrying the shared
      attributes, and a concrete Device node that both inherits from
      CoreArtifactTarget AND sets generate_template: true. Neither flag
      appears on the generic.
    expectations:
      - >-
        The concrete Device node inherits from CoreArtifactTarget so
        artifacts can attach to instances
      - >-
        The concrete Device node sets generate_template: true so users
        can clone it as a starter
      - >-
        Neither CoreArtifactTarget inheritance nor generate_template
        appears on the GenericDevice generic (generics cannot be
        artifact targets and are not instantiable as templates)
      - >-
        The Device inherits from the GenericDevice generic using its
        full kind (DcimGenericDevice)
      - "human_friendly_id is defined on the concrete Device node"
      - 'Schema starts with version: "1.0"'
    assertions:
      - name: schema-version
        check: "Schema starts with version: '1.0'"
      - name: core-artifact-target-concrete
        check: >-
          CoreArtifactTarget is inherited by the concrete Device, never
          by the generic
      - name: generate-template-concrete-only
        check: >-
          generate_template: true appears on the concrete Device, never
          on the generic
      - name: human-friendly-id
        check: human_friendly_id defined on the concrete Device

  # --- Check Creator --- #
  - name: global-check-registration
    trials: 3
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-checks/SKILL.md and follow its workflow and rules.

      Task: I need to register a global Infrahub check that detects rack unit collisions
      across all racks. The check class is RackUnitCollisionCheck and lives in
      checks/rack_unit_collision.py. It runs against a GraphQL query named rack_devices
      stored at queries/rack_devices.gql.

      Produce ONLY the `.infrahub.yml` snippet that registers both the GraphQL query and
      the check definition correctly. Do not include schema, generator, or transform
      sections — just queries: and check_definitions:.

      Save ONLY the final YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-checks/check_global_registration.py
        weight: 1.0
    expected_output: >-
      A `.infrahub.yml` snippet with a `queries:` section listing
      rack_devices, and a `check_definitions:` entry for the check.
      The check_definitions entry must NOT contain a `query:` field
      (Pydantic extra="forbid" rejects it) — the query is bound from
      the Python class's `query = "rack_devices"` attribute.
    expectations:
      - >-
        Top-level `queries:` section declares the rack_devices query
        with file_path queries/rack_devices.gql
      - >-
        `check_definitions:` has an entry for the check with name,
        file_path, and class_name
      - >-
        The check_definitions entry does NOT contain a `query:` field
        (this is the central rule — `query` is rejected by the
        Pydantic model on check_definitions, unlike
        generator_definitions which does require it)
      - >-
        Only allowed fields appear under check_definitions: name,
        file_path, class_name, targets, parameters
    assertions:
      - name: check-definitions-present
        check: check_definitions has at least one entry
      - name: no-query-field-in-check-def
        check: >-
          No check_definitions entry contains a `query:` field
      - name: only-allowed-fields-in-check-def
        check: >-
          check_definitions entries use only name, file_path,
          class_name, targets, parameters
      - name: queries-section-present
        check: "Top-level queries: section is present"
      - name: check-def-required-fields
        check: Each check_definitions entry has name and file_path

  - name: targeted-check-registration
    trials: 3
    instruction: |
      Read the skill at .agents/skills/infrahub-managing-checks/SKILL.md and follow its workflow and rules.

      Task: Register a targeted Infrahub check called LeafValidation that runs once per
      leaf device. The class is in checks/leaf.py, the GraphQL query is leaf_config stored
      at queries/leaf.gql and takes a $device variable. The targets group is leaf_devices,
      and the GraphQL $device variable should be bound to the target's name.

      Produce ONLY the `.infrahub.yml` snippet that registers both the query and the check
      correctly. Do not include schema, generator, or transform sections — just queries:
      and check_definitions:.

      Save ONLY the final YAML to: output.yml
    graders:
      - type: deterministic
        run: python graders/managing-checks/check_targeted_registration.py
        weight: 1.0
    expected_output: >-
      A `.infrahub.yml` snippet with `queries:` declaring leaf_config
      and `check_definitions:` declaring leaf_validation with targets:
      leaf_devices and parameters mapping the $device variable. The
      check_definitions entry must NOT contain a `query:` field; the
      query is bound on the Python class via `query = "leaf_config"`.
    expectations:
      - >-
        Top-level `queries:` section declares leaf_config with
        file_path queries/leaf.gql
      - >-
        check_definitions entry has name, file_path, class_name, AND
        targets: leaf_devices AND parameters mapping device to
        name__value
      - >-
        The check_definitions entry does NOT contain a `query:` field
        (rejected by Pydantic extra="forbid"; differs from
        generator_definitions which requires it)
      - >-
        parameters maps `device: name__value` so the GraphQL $device
        variable is bound to the target's name attribute
    assertions:
      - name: check-definitions-present
        check: check_definitions has at least one entry
      - name: no-query-field-in-check-def
        check: >-
          No check_definitions entry contains a `query:` field
      - name: only-allowed-fields-in-check-def
        check: >-
          check_definitions entries use only name, file_path,
          class_name, targets, parameters
      - name: queries-section-present
        check: "Top-level queries: section declares leaf_config"
      - name: check-def-required-fields
        check: Each check_definitions entry has name and file_path
      - name: targeted-has-targets-and-parameters
        check: >-
          Targeted check_definitions entry declares both targets and
          parameters

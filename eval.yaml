        Every node, attribute, and relationship `description`, `label`,
        `identifier`, and `deprecation` length is within the live cap
        published by the Infrahub schema (resolved per the
        validation-string-limits rule). Over-cap fields fail with
        `Input should have at most N characters` at `infrahubctl
        schema load` time.
      - >-
        Longer operator-facing context (picker behavior, generator
        _validate() rules, why non-edge devices are rejected) lives in
        YAML comments above the field, not inside `description:`
      - >-
        All peer references use the full namespace+name kind (DcimDevice,
        DcimInterface — not Device or Interface)
      - "human_friendly_id is defined on HandoffIntent"
      - 'Schema starts with version: "1.0"'
    assertions:

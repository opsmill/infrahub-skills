      A `.infrahub.yml` snippet with a `queries:` section listing
      rack_devices, and a `check_definitions:` entry for the check.
      The check_definitions entry must NOT contain a `query:` field
      (Pydantic extra="forbid" rejects it) — the query is bound from
      the Python class's `query = "rack_devices"` attribute.
    expectations:
      - >-
        Top-level `queries:` section declares the rack_devices query
